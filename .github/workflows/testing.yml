name: libc-test analysis on dev/testing

on:
  push:
    branches: [ ]

concurrency:
  group: libc-test-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-analyze:
    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      matrix:
        cpu: ["aarch64"]
        platform: ["debug"]
        build: ["Release"]
        include:
          - host: "ubuntu-24.04-arm"
            cpu: "aarch64"

    runs-on: ${{ matrix.host }}
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v6
      with:
        path: dandelionSDK

    - uses: docker/setup-buildx-action@v4

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install analysis dependencies
      run: python -m pip install --upgrade pip nbconvert jupyter pandas tabulate

    - name: Start libc-test dev container
      working-directory: dandelionSDK/libc_test
      run: ./dev_container.sh --sdk .. --ensure-only

    - name: Rebuild SDK and run libc-test
      run: >
        docker exec dlibc-dev bash -lc
        "cd /work/libc-test &&
        ./dev_rebuild.sh all
        --arch ${{ matrix.cpu }}
        --platform ${{ matrix.platform }}
        --build-type ${{ matrix.build }}
        --log test_${{ matrix.cpu }}_${{ matrix.platform }}_${{ matrix.build }}.log
        --csv test_results.csv"

    - name: Run notebook analysis
      working-directory: dandelionSDK/libc_test/scripts
      run: jupyter nbconvert --to notebook --execute --inplace analyze_results.ipynb

    - name: Prepare uploaded results
      run: |
        mkdir -p uploaded-results
        cp "dandelionSDK/libc_test/report/function_failure_summary.csv" "uploaded-results/function_failure_summary_${{ matrix.cpu }}_${{ matrix.platform }}_${{ matrix.build }}.csv"
        cp "dandelionSDK/libc_test/report/function_failure_summary.md" "uploaded-results/function_failure_summary_${{ matrix.cpu }}_${{ matrix.platform }}_${{ matrix.build }}.md"
        cp "dandelionSDK/libc_test/report/failure_line_details.csv" "uploaded-results/failure_line_details_${{ matrix.cpu }}_${{ matrix.platform }}_${{ matrix.build }}.csv"
        cp "dandelionSDK/libc_test/logs/test_results.csv" "uploaded-results/test_results_${{ matrix.cpu }}_${{ matrix.platform }}_${{ matrix.build }}.csv"
        cp "dandelionSDK/libc_test/logs/test_${{ matrix.cpu }}_${{ matrix.platform }}_${{ matrix.build }}.log" "uploaded-results/test_${{ matrix.cpu }}_${{ matrix.platform }}_${{ matrix.build }}.log"

    - uses: actions/upload-artifact@v6
      with:
        name: libc-test-analysis-${{ matrix.cpu }}-${{ matrix.platform }}-${{ matrix.build }}
        path: uploaded-results/